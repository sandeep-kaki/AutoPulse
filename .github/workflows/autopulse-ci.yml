# ─────────────────────────────────────────────────────
# AutoPulse CI/CD Pipeline
# ─────────────────────────────────────────────────────

name: AutoPulse CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '30 18 * * *'

jobs:
  smoke-tests:
    name: Smoke Tests (Every Push)
    runs-on: ubuntu-latest
#    if: false              # to temporarily stop the smoke tests to run on every push

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Install Google Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub \
            | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ \
            stable main" \
            | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable
          google-chrome --version

      - name: Create config.properties
        run: |
          mkdir -p src/test/resources
          cat > src/test/resources/config.properties << EOF
          base.url=https://automationexercise.com
          browser=chrome
          headless=false
          implicit.wait=10
          explicit.wait=15
          page.load.timeout=60
          api.base.url=https://automationexercise.com/api
          reports.path=reports/
          screenshots.path=reports/screenshots/
          ai.enabled=true
          ai.api.key=placeholder
          ai.model=llama-3.3-70b-versatile
          ai.max.tokens=300
          EOF

      - name: Run Smoke Tests
        run: mvn test -B -Dgroups="smoke"
        env:
          CI: true
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Upload Smoke Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Smoke-Test-Report
          path: reports/
          retention-days: 7

  regression-tests:
    name: Full Regression (Nightly)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' ||     
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Install Google Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub \
            | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ \
            stable main" \
            | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable

      - name: Create config.properties
        run: |
          mkdir -p src/test/resources
          cat > src/test/resources/config.properties << EOF
          base.url=https://automationexercise.com
          browser=chrome
          headless=false
          implicit.wait=10
          explicit.wait=15
          page.load.timeout=60
          api.base.url=https://automationexercise.com/api
          reports.path=reports/
          screenshots.path=reports/screenshots/
          ai.enabled=true
          ai.api.key=placeholder
          ai.model=gemini-2.5-flash-lite
          ai.max.tokens=100
          EOF

      - name: Run Full Regression Suite
        run: mvn test -B
        env:
          CI: true
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Upload Full Regression Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Full-Regression-Report
          path: reports/
          retention-days: 30