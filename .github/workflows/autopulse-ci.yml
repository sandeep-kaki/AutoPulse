# ─────────────────────────────────────────────────────
# AutoPulse CI/CD Pipeline
# Runs automatically on every push to main branch
# ─────────────────────────────────────────────────────

name: AutoPulse CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    # Full regression every night at midnight IST
    # Cron: minute hour day month weekday
    # "30 18 * * *" = 18:30 UTC = midnight IST
    - cron: '30 18 * * *'

jobs:
  smoke-tests:
    name: Smoke Tests (Every Push)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Install Google Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub \
            | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ \
            stable main" \
            | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable
          google-chrome --version

      - name: Run Smoke Tests
        run: mvn test -B -Dgroups="smoke"
        env:
          CI: true
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        # -Dgroups="smoke" tells TestNG to run only
        # tests tagged with @Test(groups = {"smoke"})

      - name: Upload Smoke Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Smoke-Test-Report
          path: reports/
          retention-days: 7

  regression-tests:
    name: Full Regression (Nightly)
    runs-on: ubuntu-latest
    # Only run full regression on schedule or manual trigger
    # NOT on every push — saves CI minutes
    if: github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Install Google Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub \
            | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ \
            stable main" \
            | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable

      - name: Run Full Regression Suite
        run: mvn test -B
        env:
          CI: true
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Upload Full Regression Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Full-Regression-Report
          path: reports/
          retention-days: 30